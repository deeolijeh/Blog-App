<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up — RecipeHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&display=swap" rel="stylesheet" />
  <link href="/public/style.css" rel="stylesheet" />
  <script src="/public/firebase-config.js"></script>
</head>
<body>
  <div id="nav"></div>
  <main class="container">
    <div class="auth-card">
      <div style="text-align: center; margin-bottom: 1.5rem;">
        <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🍽️</div>
        <h1 class="mb-1">Join Our Community</h1>
      </div>
      <p class="text-muted mb-4" style="font-family:system-ui,sans-serif; text-align: center;">Start sharing your favorite recipes in seconds.</p>
      <form id="form">
        <input class="form-control mb-2" name="name" placeholder="Display name" required />
        <input class="form-control mb-2" name="email" type="email" placeholder="Email" required />
        <input class="form-control mb-3" name="password" type="password" placeholder="Password (6+ chars)" required minlength="6" />
        <button class="btn btn-ink w-100 mb-2" type="submit">Create account</button>
      </form>
      <button id="google" class="btn btn-outline-secondary w-100 rounded-2 mb-3" style="border-color: #ddd;">Continue with Google</button>
      <div id="err" class="text-danger small mb-2" style="font-family:system-ui,sans-serif;"></div>
      <p class="text-center small text-muted" style="font-family:system-ui,sans-serif;">
        Already have an account? <a href="/public/login.html" style="color: var(--accent-green); text-decoration: none; font-weight: 600;">Sign in</a>
      </p>
    </div>
  </main>
  <script type="module">
    import { renderNav } from "/public/nav.js";
    import { auth, createUserWithEmailAndPassword, updateProfile, signInWithPopup, googleProvider } from "/public/firebase-init.js";
    renderNav();
    const err = document.getElementById("err");
    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      err.textContent = "";
      const f = new FormData(e.target);
      try {
        const cred = await createUserWithEmailAndPassword(auth, f.get("email"), f.get("password"));
        await updateProfile(cred.user, { displayName: f.get("name") });
        location.href = "/public/index.html";
      } catch (e) { err.textContent = e.message; }
    });
    document.getElementById("google").onclick = async () => {
      err.textContent = "";
      try { await signInWithPopup(auth, googleProvider); location.href = "/public/index.html"; }
      catch (e) { err.textContent = e.message; }
    };
  </script>
</body>
</html>
